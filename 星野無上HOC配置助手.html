<!doctype html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>星野無上HOC配置助手</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            display: grid;
            min-height: 100vh;
            margin: 0;
            place-items: center;
            padding: 24px;
            color: #f5f7ff;
            background: #101522;
            font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
        }

        main {
            width: min(100%, 520px);
            padding: 40px 28px;
            border: 1px solid #303b55;
            border-radius: 20px;
            background: #182033;
            text-align: center;
            box-shadow: 0 18px 50px rgb(0 0 0 / 30%);
        }

        h1 {
            margin: 0 0 12px;
            font-size: clamp(24px, 6vw, 36px);
        }

        p {
            margin: 0 0 28px;
            color: #aeb9d1;
        }

        a {
            display: inline-block;
            padding: 14px 26px;
            border-radius: 12px;
            color: #08101f;
            background: #74d4ff;
            font-size: 18px;
            font-weight: 700;
            text-decoration: none;
            transition: transform 160ms ease, background 160ms ease;
        }

        a:hover {
            background: #a5e4ff;
            transform: translateY(-2px);
        }

        a:focus-visible {
            outline: 3px solid #ffffff;
            outline-offset: 4px;
        }
    </style>
</head>
<body>
    <main>
        <h1>星野無上 HOC 配置助手</h1>
        <p>点击下方按钮访问在线配置生成器</p>
        <a href="https://littonishir.github.io/Mariko-OC-Configurator/">立即访问</a>
    </main>
</body>
</html>
